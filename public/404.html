<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Caffinity</title>
    <script>
      (function () {
        var path = window.location.pathname;
        var repoBase = path.split('/').slice(0, -1).join('/');
        var route = path.slice(repoBase.length) || '/';
        window.location.replace(repoBase + '/#' + route + window.location.search + window.location.hash);
      })();
    </script>
  </head>
  <body>
    <p>Redirecting to Caffinity...</p>
  </body>
</html>
